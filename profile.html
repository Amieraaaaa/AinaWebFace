<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinSight — Profile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f3e8ff 0%, #ede9fe 50%, #ddd6fe 100%);
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(109, 40, 217, 0.12);
      text-align: center;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: #1e1b4b;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 auto 20px;
      letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
    }

    .name  { font-size: 22px; font-weight: 700; color: #1e1b4b; margin-bottom: 6px; }
    .email { font-size: 15px; color: #6b7280; margin-bottom: 28px; }

    .info-section {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: left;
      margin-bottom: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
    }

    .info-row + .info-row { border-top: 1px solid #e5e7eb; }

    .info-label { color: #6b7280; font-weight: 500; }
    .info-value { color: #111827; font-weight: 600; }

    .badge {
      background: #ede9fe;
      color: #6d28d9;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .token-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: left;
      margin-bottom: 24px;
    }

    .token-label {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .token-value {
      font-family: monospace;
      font-size: 11px;
      color: #6b7280;
      word-break: break-all;
      line-height: 1.5;
    }

    .logout-btn {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #dc2626;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .logout-btn:hover  { background: #fef2f2; border-color: #f87171; }
    .logout-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <a class="logo" href="/">
        <div class="logo-icon">✦</div>
        <span class="logo-text">SkinSight</span>
      </a>
    </div>

    <div class="avatar"   id="avatar">--</div>
    <div class="name"     id="display-name">Loading…</div>
    <div class="email"    id="display-email"></div>

    <div class="info-section">
      <div class="info-row">
        <span class="info-label">Account type</span>
        <span class="badge">Student</span>
      </div>
      <div class="info-row">
        <span class="info-label">Email verified</span>
        <span class="verified-badge" id="verified-badge">✓ Verified</span>
      </div>
      <div class="info-row">
        <span class="info-label">Provider</span>
        <span class="info-value" id="display-provider">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">User ID</span>
        <span class="info-value" id="display-id"
              style="font-family:monospace;font-size:11px;">—</span>
      </div>
    </div>

    <!-- Shows the live Supabase JWT (for dev/demo transparency) -->
    <div class="token-box">
      <div class="token-label">Supabase JWT (access token)</div>
      <div class="token-value" id="token-preview">—</div>
    </div>

    <button class="logout-btn" id="logout-btn">Sign out</button>
  </div>

  <!-- Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = window.supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getInitials(name) {
      return name.split(" ").map((w) => w[0]).join("").toUpperCase().slice(0, 2);
    }

    function renderUser(user, accessToken) {
      const name = user.user_metadata?.full_name
                || user.user_metadata?.name
                || user.email.split("@")[0];

      document.getElementById("avatar").textContent       = getInitials(name);
      document.getElementById("display-name").textContent = name;
      document.getElementById("display-email").textContent = user.email;
      document.getElementById("display-id").textContent   = user.id;
      document.getElementById("display-provider").textContent =
        user.app_metadata?.provider || "email";
      document.title = `SkinSight — ${name}`;

      if (!user.email_confirmed_at) {
        const badge = document.getElementById("verified-badge");
        badge.textContent = "⚠ Unverified";
        badge.style.background = "#fef9c3";
        badge.style.color = "#854d0e";
      }

      if (accessToken) {
        // Show first 40 chars + ellipsis so the box stays readable
        document.getElementById("token-preview").textContent =
          accessToken.slice(0, 40) + "…" + accessToken.slice(-20);
      }
    }

    // Instant render from localStorage cache while Supabase loads
    const cached = localStorage.getItem("sb_user");
    if (cached) {
      try {
        const u = JSON.parse(cached);
        document.getElementById("avatar").textContent        = getInitials(u.name || u.email);
        document.getElementById("display-name").textContent  = u.name || u.email;
        document.getElementById("display-email").textContent = u.email;
      } catch {}
    }

    // Verify session with Supabase
    (async () => {
      const { data: { session }, error } = await supabase.auth.getSession();

      if (error || !session) {
        localStorage.removeItem("sb_user");
        window.location.replace("login.html");
        return;
      }

      // Update cache with fresh data
      localStorage.setItem("sb_user", JSON.stringify({
        id:    session.user.id,
        email: session.user.email,
        name:  session.user.user_metadata?.full_name
              || session.user.user_metadata?.name
              || session.user.email.split("@")[0],
      }));

      renderUser(session.user, session.access_token);

      // Optionally verify token against our Flask backend
      try {
        const res = await fetch("/api/me", {
          headers: { Authorization: `Bearer ${session.access_token}` },
        });
        if (res.ok) {
          const { user } = await res.json();
          document.getElementById("display-id").textContent = user.sub;
        }
      } catch {
        // Backend unreachable — session is still valid via Supabase
      }
    })();

    // Logout
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      localStorage.removeItem("sb_user");
      window.location.replace("login.html");
    });
  </script>
</body>
</html>
