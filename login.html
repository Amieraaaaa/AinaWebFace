<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinSight — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f3e8ff 0%, #ede9fe 50%, #ddd6fe 100%);
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(109, 40, 217, 0.12);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #1e1b4b;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button[type="submit"]:hover  { opacity: 0.92; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    #error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    #error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">SkinSight</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in with your Supabase account</p>

    <div id="error-msg" role="alert"></div>

    <form id="login-form" novalidate>
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
      />

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />

      <button type="submit" id="submit-btn">Sign in</button>
    </form>
  </div>

  <!-- Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = window.supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Already logged in — skip to profile
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.replace("profile.html");
    })();

    const form      = document.getElementById("login-form");
    const errorMsg  = document.getElementById("error-msg");
    const submitBtn = document.getElementById("submit-btn");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }

    function clearError() {
      errorMsg.textContent = "";
      errorMsg.classList.remove("visible");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showError("Please enter your email and password.");
        return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = "Signing in…";

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message || "Invalid email or password.");
        submitBtn.disabled    = false;
        submitBtn.textContent = "Sign in";
        return;
      }

      // Supabase automatically persists the session to localStorage.
      // We store a summary so profile.html can render instantly.
      localStorage.setItem("sb_user", JSON.stringify({
        id:    data.user.id,
        email: data.user.email,
        name:  data.user.user_metadata?.full_name
              || data.user.user_metadata?.name
              || data.user.email.split("@")[0],
      }));

      window.location.replace("profile.html");
    });
  </script>
</body>
</html>
